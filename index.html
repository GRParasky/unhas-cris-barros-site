<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════════════════════════
         SEO — Atualize todas as informações abaixo para o cliente
         Dica: copie os valores de src/config/client.js para manter consistência
    ═══════════════════════════════════════════════════════════════════════════ -->

    <!-- TODO: Título da aba do browser e resultado de busca (50-60 chars) -->
    <title>Nome da Marca | Descrição Curta do Serviço</title>

    <!-- TODO: Descrição para Google/Bing (150-160 chars) -->
    <meta name="description" content="Descrição do site para mecanismos de busca. Inclua o serviço principal e a localização. Ideal: 150-160 caracteres." />

    <!-- TODO: Palavras-chave (separadas por vírgula) -->
    <meta name="keywords" content="palavra-chave 1, palavra-chave 2, nome da marca" />

    <!-- TODO: Nome do autor/empresa -->
    <meta name="author" content="Nome da Marca" />

    <meta name="robots" content="index, follow" />

    <!-- TODO: Cole o código de verificação do Google Search Console aqui (ou remova a linha) -->
    <!-- <meta name="google-site-verification" content="SEU_CODIGO_AQUI" /> -->

    <!-- TODO: Ajuste o código de região (BR-SP = São Paulo, BR-SC = Santa Catarina, etc.) -->
    <meta name="geo.region" content="BR-XX" />

    <!-- TODO: Cidade e estado -->
    <meta name="geo.placename" content="Cidade, Estado" />

    <!-- ─── Open Graph (Facebook, WhatsApp, LinkedIn) ─────────────────────── -->
    <meta property="og:type" content="website" />

    <!-- TODO: URL completa do site em produção -->
    <meta property="og:url" content="https://seudominio.com.br/" />

    <!-- TODO: Título para compartilhamento social -->
    <meta property="og:title" content="Nome da Marca | Serviço Principal" />

    <!-- TODO: Descrição para compartilhamento -->
    <meta property="og:description" content="Descrição atrativa para quando o link for compartilhado em redes sociais." />

    <!-- TODO: Imagem de capa (1200x630px, coloque em public/images/og-image.jpg) -->
    <meta property="og:image" content="https://seudominio.com.br/images/og-image.jpg" />

    <meta property="og:locale" content="pt_BR" />

    <!-- ─── Twitter Card ───────────────────────────────────────────────────── -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://seudominio.com.br/" />
    <meta property="twitter:title" content="Nome da Marca | Serviço Principal" />
    <meta property="twitter:description" content="Descrição atrativa para o Twitter." />
    <meta property="twitter:image" content="https://seudominio.com.br/images/og-image.jpg" />

    <!-- ─── Canonical ─────────────────────────────────────────────────────── -->
    <!-- TODO: URL canônica (igual ao og:url) -->
    <link rel="canonical" href="https://seudominio.com.br/" />

    <!-- ─── JSON-LD Structured Data (SEO avançado) ───────────────────────── -->
    <!-- TODO: Preencha todos os campos abaixo com os dados reais do cliente  -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Nome da Marca",
      "description": "Descrição do negócio para o Google.",
      "url": "https://seudominio.com.br",
      "logo": "https://seudominio.com.br/images/logo.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Cidade",
        "addressRegion": "UF",
        "addressCountry": "BR"
      },
      "areaServed": "Região de Atuação",
      "email": "contato@exemplo.com",
      "telephone": "+55-00-00000-0000",
      "sameAs": [
        "https://www.youtube.com/@seucanal",
        "https://www.instagram.com/seuinstagram",
        "https://www.tiktok.com/@seutiktok"
      ],
      "priceRange": "$$"
    }
    </script>

    <!-- Font Awesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- TODO: Substitua pelo favicon do cliente (coloque em public/) -->
    <link rel="icon" type="image/png" href="/images/logo.png" />

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
